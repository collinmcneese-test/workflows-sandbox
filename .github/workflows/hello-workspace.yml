name: hello to github_workspace

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/hello-workspace.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: echo $GITHUB_WORKSPACE

